<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Itachi Zone</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:#08020e;color:#f0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:rgba(16,4,22,.97);border:1px solid rgba(229,9,20,0.3);border-radius:20px;padding:36px 32px;width:100%;max-width:500px;}
h1{font-size:20px;font-weight:700;color:#ff6ec7;margin-bottom:6px;}
p.sub{font-size:12px;color:#a08080;margin-bottom:28px;}
label{font-size:11px;font-weight:700;color:#a08080;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
input,select{width:100%;padding:12px 16px;background:rgba(12,4,18,.85);border:1.5px solid rgba(229,9,20,0.25);border-radius:10px;font-size:14px;color:#f0e0e0;outline:none;margin-bottom:14px;}
input:focus,select:focus{border-color:#e91e8c;}
select option{background:#1a0a1a;}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#8b0050,#e91e8c);color:#fff;margin-bottom:10px;}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.3);color:#ff6ec7;}
.btn-secondary:hover{background:rgba(229,9,20,.15);}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;}
.msg.ok{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.3);color:#00e5a0;}
.msg.err{background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.3);color:#ff6ec7;}
.divider{height:1px;background:rgba(229,9,20,.15);margin:24px 0;}
.lista{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;}
.cuenta-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(233,30,140,.05);border:1px solid rgba(233,30,140,.15);border-radius:10px;}
.cuenta-info{display:flex;flex-direction:column;gap:2px;}
.cuenta-correo{font-size:13px;font-weight:600;color:#f0e0e0;}
.cuenta-svc{font-size:11px;color:#a08080;text-transform:uppercase;letter-spacing:1px;}
.btn-del{padding:6px 12px;background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.3);border-radius:8px;color:#ff6ec7;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-del:hover{background:rgba(229,9,20,.25);}
.empty{font-size:13px;color:#502040;text-align:center;padding:20px;}
#loginSection{}
#adminSection{display:none;}
</style>
</head>
<body>
<div class="card">

  <!-- LOGIN -->
  <div id="loginSection">
    <h1>🔐 Panel Admin</h1>
    <p class="sub">Itachi Zone — Gestión de correos</p>
    <div id="loginMsg" class="msg"></div>
    <label>Contraseña</label>
    <input type="password" id="passInput" placeholder="••••••••" />
    <button class="btn btn-primary" onclick="login()">Entrar</button>
  </div>

  <!-- ADMIN -->
  <div id="adminSection">
    <h1>⚡ Gestión de Correos</h1>
    <p class="sub">Agrega o elimina correos autorizados</p>

    <div id="msg" class="msg"></div>

    <label>Correo alias iCloud</label>
    <input type="text" id="correoInput" placeholder="alias@icloud.com" />

    <label>Servicio</label>
    <select id="servicioSelect">
      <option value="netflix">Netflix</option>
      <option value="disney">Disney+</option>
    </select>

    <button class="btn btn-primary" onclick="agregarCuenta()">➕ Agregar correo</button>

    <div class="divider"></div>

    <label>Correos registrados</label>
    <div class="lista" id="lista">
      <div class="empty">Cargando...</div>
    </div>

    <div class="divider"></div>
    <button class="btn btn-secondary" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

</div>

<script>
const API = '/api/admin';
let token = '';

function showMsg(id, tipo, texto) {
  const el = document.getElementById(id);
  el.className = 'msg ' + tipo;
  el.textContent = texto;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function login() {
  const pass = document.getElementById('passInput').value.trim();
  if (!pass) return;
  token = pass;
  const res = await fetch(API, { headers: { Authorization: 'Bearer ' + token } });
  if (res.status === 401) {
    showMsg('loginMsg', 'err', '❌ Contraseña incorrecta.');
    token = '';
    return;
  }
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('adminSection').style.display = 'block';
  cargarLista();
}

async function cargarLista() {
  const res  = await fetch(API, { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  const lista = document.getElementById('lista');
  const cuentas = data.cuentas || {};
  const keys = Object.keys(cuentas);
  if (keys.length === 0) {
    lista.innerHTML = '<div class="empty">No hay correos registrados.</div>';
    return;
  }
  lista.innerHTML = keys.map(correo => `
    <div class="cuenta-item">
      <div class="cuenta-info">
        <span class="cuenta-correo">${correo}</span>
        <span class="cuenta-svc">${cuentas[correo].servicio}</span>
      </div>
      <button class="btn-del" onclick="borrarCuenta('${correo}')">🗑 Borrar</button>
    </div>
  `).join('');
}

async function agregarCuenta() {
  const correo   = document.getElementById('correoInput').value.trim().toLowerCase();
  const servicio = document.getElementById('servicioSelect').value;
  if (!correo || !correo.includes('@')) {
    showMsg('msg', 'err', '❌ Ingresa un correo válido.');
    return;
  }
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ correo, servicio }),
  });
  const data = await res.json();
  if (data.ok) {
    showMsg('msg', 'ok', '✅ Correo agregado correctamente.');
    document.getElementById('correoInput').value = '';
    cargarLista();
  } else {
    showMsg('msg', 'err', '❌ ' + (data.error || 'Error desconocido.'));
  }
}

async function borrarCuenta(correo) {
  if (!confirm('¿Borrar ' + correo + '?')) return;
  const res = await fetch(API, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ correo }),
  });
  const data = await res.json();
  if (data.ok) {
    showMsg('msg', 'ok', '✅ Correo eliminado.');
    cargarLista();
  } else {
    showMsg('msg', 'err', '❌ ' + (data.error || 'Error.'));
  }
}

function cerrarSesion() {
  token = '';
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('adminSection').style.display = 'none';
  document.getElementById('passInput').value = '';
}

document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
